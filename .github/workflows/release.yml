name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v || python -m unittest discover tests/

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows
            executable_suffix: .exe
          - os: ubuntu-latest
            platform: linux
            executable_suffix: ''
          - os: macos-latest
            platform: macos
            executable_suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --onefile --windowed --name snake-game run_game.py --hidden-import=snake_game --hidden-import=snake_game.game --hidden-import=snake_game.snake --hidden-import=snake_game.food --hidden-import=snake_game.ui --hidden-import=snake_game.config --hidden-import=snake_game.logger --hidden-import=snake_game.highscore --hidden-import=snake_game.main --noconfirm

      - name: Build executable (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller --onefile --windowed --name snake-game run_game.py --hidden-import=snake_game --hidden-import=snake_game.game --hidden-import=snake_game.snake --hidden-import=snake_game.food --hidden-import=snake_game.ui --hidden-import=snake_game.config --hidden-import=snake_game.logger --hidden-import=snake_game.highscore --hidden-import=snake_game.main --noconfirm

      - name: Build executable (macOS)
        if: matrix.platform == 'macos'
        run: |
          pyinstaller --onefile --windowed --name snake-game run_game.py --hidden-import=snake_game --hidden-import=snake_game.game --hidden-import=snake_game.snake --hidden-import=snake_game.food --hidden-import=snake_game.ui --hidden-import=snake_game.config --hidden-import=snake_game.logger --hidden-import=snake_game.highscore --hidden-import=snake_game.main --noconfirm

      - name: Create distribution package
        run: |
          mkdir -p dist/package

          # Copy executable (the main artifact)
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp dist/snake-game.exe dist/package/
          else
            cp dist/snake-game dist/package/
            chmod +x dist/package/snake-game
          fi

          # Copy documentation
          cp README.md dist/package/
          cp LICENSE dist/package/

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd dist
          powershell Compress-Archive -Path package -DestinationPath snake-game-${{ matrix.platform }}.zip

      - name: Create archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czvf snake-game-${{ matrix.platform }}.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-${{ matrix.platform }}
          path: |
            dist/snake-game-${{ matrix.platform }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec sha256sum {} \; > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          body: |
            ## 贪吃蛇游戏发布

            ### 下载说明
            - **Windows**: 下载 `snake-game-windows.zip`，解压后运行 `snake-game.exe`
            - **Linux**: 下载 `snake-game-linux.tar.gz`，解压后运行 `./snake-game`
            - **macOS**: 下载 `snake-game-macos.tar.gz`，解压后运行 `./snake-game`

            ### 运行方法
            1. 解压下载的文件
            2. 直接运行可执行文件（无需安装Python）

            ### 注意事项
            - Linux/macOS首次运行可能需要添加执行权限: `chmod +x snake-game`
            - macOS可能需要在"系统偏好设置 > 安全性与隐私"中允许运行

            ### 校验文件完整性
            请使用 `checksums.txt` 校验下载文件的 SHA256 哈希值。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}